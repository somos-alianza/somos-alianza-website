<meta charset="utf-8" />

<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta
  http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; connect-src 'self' {{ site.api_url }}; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com; object-src 'none'; base-uri 'none'; form-action 'self'"
/>

<title>
  {% if page.title %} {{ page.title }} | {{ site.title }} {% else %} {{
  site.title }} {% endif %}
</title>

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />

  href="https://cdnjs.cloudflare.com/ajax/libs/picocss/2.1.1/pico.min.css"

  crossorigin="anonymous"
  referrerpolicy="no-referrer"
/>

  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
