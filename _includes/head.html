<meta charset="utf-8" />

<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta
  http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; connect-src 'self' {{ site.api_url }}; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com; object-src 'none'; base-uri 'none'; form-action 'self'"
/>

<title>
  {% if page.title %} {{ page.title }} | {{ site.title }} {% else %} {{
  site.title }} {% endif %}
</title>

<link
  rel="stylesheet"
  href="{{ '/assets/css/pico/pico.min.css' | relative_url }}"
/>
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
{% if page.css %} {% for stylesheet in page.css %}
<link rel="stylesheet" href="{{ stylesheet | relative_url }}" />
{% endfor %} {% endif %}
