---
layout: default
title: Organizations
---

<h1>Organizations</h1>
<a href="{{ '/organizations/new.html' | relative_url }}">New Organization</a>

<table id="organizations-table" style="display: none">
  <thead>
    <tr>
      <th>Title</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="organizations-body"></tbody>
</table>

<script>
  const loadOrganizations = async () => {
    const apiUrl = document.body.dataset.apiUrl;
    const response = await fetch(`${apiUrl}/organizations`, {
      credentials: "include"
    });

    if (!response.ok) {
      window.location.href = "{{ '/login.html' | relative_url }}";
      return;
    }
    const tbody = document.getElementById("organizations-body");
    const organizations = await response.json();

    if (organizations.data.length > 0) {
      document.getElementById("organizations-table").style.display = "table";
      organizations.data.forEach((org) => {
        const row = document.createElement("tr");
        row.innerHTML = `
    <td>${org.attributes.title}</td>
    <td>
      <a href="{{ '/organizations/edit.html' | relative_url }}?id=${org.id}">Edit</a>
      <button onclick="deleteOrganization(${org.id})">Delete</button>
    </td>
  `;
        tbody.appendChild(row);
      });
    }
  };

  const deleteOrganization = async (id) => {
    const apiUrl = document.body.dataset.apiUrl;
    const response = await fetch(`${apiUrl}/organizations/${id}`, {
      method: "DELETE",
      credentials: "include"
    });

    if (response.ok) {
      loadOrganizations();
    }
  };

  loadOrganizations();
</script>
