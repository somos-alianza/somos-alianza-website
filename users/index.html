---
layout: default
title: Organization Users
---

<div class="champion-only">
  <h1>Manage <span id="org-title"></span> Users</h1>
  <a href="{{ '/users/new.html' | relative_url }}" id="add-user-button">
    Add New User
  </a>

  <table id="users-table" style="display: none">
    <thead>
      <tr>
        <th>User</th>
        <th>Champion</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="users-body"></tbody>
  </table>

  <template id="user-row-template">
    <tr>
      <td class="user-email"></td>
      <td class="user-champion"></td>
      <td>
        <a class="user-edit">Edit</a>
        <button
          class="user-delete"
          data-confirm="Are you sure you want to delete this user?"
        >
          Delete
        </button>
      </td>
    </tr>
  </template>
</div>

<script
  type="module"
  src="{{ '/assets/js/pages/users/index.js' | relative_url }}"
></script>
